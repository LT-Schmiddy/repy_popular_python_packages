# This is the base information common to all mod NRMs generated by this project.

# Fields that end up in the mod's manifest.
[manifest]

# The name that will show up for this mod in the mod menu. This should be human readable.
display_name = "Recomp External Python API"

# The description that will show up when this mod is displayed in the mod menu. This should be human readable.
description =  """
A resource for modders. Enables use of Python code and the Python Standard library within mods, enabling many behaviors that would otherwise require an external library to be compiled.
"""

# A short description that will show up in this mod's entry in the mod list. This should be human readable and kept short
# to prevent it from being cut off due to the limited space.
short_description = "A resource for modders. Allows running Python code from mods."

# Authors of this mod.
authors = [ "LT_Schmiddy" ]

# Native libraries (e.g. DLLs) and the functions they export.
native_libraries = [
# Example native library:
    { name = "RecompPythonNative", funcs = [
        # Preinit
        "PythonNative_Preinit_RegisterNrmInModuleSearchPath",
        "PythonNative_Preinit_RegisterSubinterpreter",

        # General
        "PythonNative_Init",
        "PythonNative_Release",
        "PythonNative_MakeSUH",
        "PythonNative_IsValidHandle",
        "PythonNative_GetSUH",
        "PythonNative_SetSUH",
        "PythonNative_CopyHandle",

        #Interpreters
        "PythonNative_PushInterpreter",
        "PythonNative_PopInterpreter",
        "PythonNative_GetCurrentInterpreter",
        "PythonNative_GetInterpreterAutoDisarm",
        "PythonNative_SetInterpreterAutoDisarm",
        "PythonNative_GetHandleInterpreter",

        # Modules
        "PythonNative_AddCStrToSysPath",
        "PythonNative_ConstructModuleFromCStr",
        "PythonNative_ConstructModuleFromCStrN",
        "PythonNative_ImportModule",

        # Primatives
        "PythonNative_CreateBool",
        "PythonNative_CastBool",
        "PythonNative_CreateU8",
        "PythonNative_CastU8",
        "PythonNative_CreateS8",
        "PythonNative_CastS8",
        "PythonNative_CreateU16",
        "PythonNative_CastU16",
        "PythonNative_CreateS16",
        "PythonNative_CastS16",
        "PythonNative_CreateU32",
        "PythonNative_CastU32",
        "PythonNative_CreateS32",
        "PythonNative_CastS32",
        "PythonNative_CreateF32",
        "PythonNative_CastF32",

        # 64-bit Primatives
        "PythonNative_U64Operation",
        "PythonNative_S64Operation",
        "PythonNative_F64Operation",
        
        # Strings
        "PythonNative_CreateStr",
        "PythonNative_CreateStrN",
        "PythonNative_CastStr_Prepare",
        "PythonNative_CastStr_Copy",
        "PythonNative_CreateByteStr",
        "PythonNative_CreateByteStrN",
        "PythonNative_CastByteStr_Prepare",
        "PythonNative_CastByteStr_Copy",

        # Memcpy:
        "PythonNative_MemcpyToBytes",
        "PythonNative_MemcpyToByteArray",
        "PythonNative_MemcpyFromBuffer",

        # Indexing and Slicing
        "PythonNative_Len",

        # Object Attributes
        "PythonNative_GetAttr",
        "PythonNative_GetAttrCStr",
        "PythonNative_SetAttr",
        "PythonNative_SetAttrCStr",
        "PythonNative_HasAttr",
        "PythonNative_HasAttrCStr",
        "PythonNative_DelAttr",
        "PythonNative_DelAttrCStr",

        # Iteration
        "PythonNative_Iter",
        "PythonNative_Next",
        
        # Tuple
        "PythonNative_CreateTuple",
        "PythonNative_TupleGetIndexS32",
        "PythonNative_CreatePairCStr",
        
        # Dicts    
        "PythonNative_CreateDict",
        "PythonNative_DictGet",
        "PythonNative_DictGetCStr",
        "PythonNative_DictSet",
        "PythonNative_DictSetCStr",
        "PythonNative_DictHas",
        "PythonNative_DictHasCStr",
        "PythonNative_DictDel",
        "PythonNative_DictDelCStr",
        
        # Execution
        "PythonNative_Compile",
        "PythonNative_CompileCStr",
        "PythonNative_CompileCStrN",
        "PythonNative_Exec",
        "PythonNative_ExecCStr",
        "PythonNative_ExecCStrN",
        "PythonNative_Eval",
        "PythonNative_EvalCStr",
        "PythonNative_EvalCStrN",
        "PythonNative_VL",

        # Varia

        # Python Function Calls
        "PythonNative_Call",
        "PythonNative_CallReturn",
        "PythonNative_CallAttr",
        "PythonNative_CallAttrCStr",
        "PythonNative_CallAttrReturn",
        "PythonNative_CallAttrCStrReturn",
        
        # Exception Handling
        "PythonNative_IsErrorSet",
        "PythonNative_GetErrorType",
        "PythonNative_GetErrorTrace",
        "PythonNative_GetErrorValue",
        "PythonNative_ClearError",

        # ZipFile Access
        "PythonNative_GetFileFromPathCStr",

        # Logging
        "PythonNative_SetLogMetaData",
        "PythonNative_CommitLogMessage"
    ] }
]

# Mod config options
[[manifest.config_options]]
id = "log_level"
name = "Log Level"
description = """Log information about RecompExternalPython to console, and to REPY.log. 

Only applied on game startup. Relaunch the game to change the value."""
type = "Enum"
options = [ "NONE", "FATAL", "ERROR", "WARNING", "INFO", "DEBUG", "VERBOSE"]
default = "WARNING"

[[manifest.config_options]]
id = "log_to_file"
name = "Save REPY's log to a file."
description = """
Save REPY's log to a file.
"""
type = "Enum"
options = [ "Off", "On"]
default = "Off"

