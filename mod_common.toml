# This is the base information common to all mod NRMs generated by this project.

# Fields that end up in the mod's manifest.
[manifest]

# The name that will show up for this mod in the mod menu. This should be human readable.
display_name = "REPY: Popular Python Packages"

# The description that will show up when this mod is displayed in the mod menu. This should be human readable.
description =  """
A resource for modders. Enables use of Python code and the Python Standard library within mods, enabling many behaviors that would otherwise require an external library to be compiled.
"""

# A short description that will show up in this mod's entry in the mod list. This should be human readable and kept short
# to prevent it from being cut off due to the limited space.
short_description = "A resource for modders. Allows running Python code from mods."

# Authors of this mod.
authors = [ "LT_Schmiddy" ]


